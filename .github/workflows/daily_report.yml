name: i2Global Daily Dashboard

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  send-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "WINDSOR_API_KEY=${{ secrets.WINDSOR_API_KEY }}" >> .env
          echo "WINDSOR_ACCOUNT_IDS=${{ secrets.WINDSOR_ACCOUNT_IDS }}" >> .env
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SMTP_HOST=smtp.gmail.com" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "GD_TEAM_EMAILS=${{ secrets.GD_TEAM_EMAILS }}" >> .env
          echo "PERF_TEAM_EMAILS=${{ secrets.PERF_TEAM_EMAILS }}" >> .env
          echo "LEADERSHIP_EMAILS=${{ secrets.LEADERSHIP_EMAILS }}" >> .env
          echo "DATE_PRESET=last_1dT" >> .env
          echo "GDRIVE_FILE_ID=${{ secrets.GDRIVE_FILE_ID }}" >> .env

      - name: Create credentials.json
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python -c "import base64,os; data=os.environ['GOOGLE_CREDS'].replace(' ','').replace('\n','').replace('\r',''); open('credentials.json','wb').write(base64.b64decode(data))"

      - name: Create token.pickle
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: python -c "import base64,os; data=os.environ['GOOGLE_TOKEN'].replace(' ','').replace('\n','').replace('\r',''); open('token.pickle','wb').write(base64.b64decode(data))"

      - name: Run daily report
        run: python daily_report.py
